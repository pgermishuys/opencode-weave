<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weave Eval Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .stat-card .label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat-card .delta { font-size: 13px; margin-top: 2px; }
    .delta-up { color: var(--green); }
    .delta-down { color: var(--red); }
    .delta-flat { color: var(--text-dim); }
    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .chart-container h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .chart-wrapper { position: relative; height: 280px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-stable { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .badge-flaky { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
    .badge-failing { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .badge-new { background: rgba(88, 166, 255, 0.15); color: var(--blue); }
    .trend-dots { letter-spacing: 2px; font-size: 16px; }
    .loading { text-align: center; padding: 60px; color: var(--text-dim); }
    .error { text-align: center; padding: 60px; color: var(--red); }
    .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }
    .empty-state h2 { color: var(--text); margin-bottom: 8px; }
    #data-source { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; word-break: break-all; }
    .refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      float: right;
    }
    .refresh-btn:hover { border-color: var(--blue); }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: flex-start;">
    <div>
      <h1>Weave Eval Dashboard</h1>
      <div class="subtitle">Agent routing eval trends over time</div>
    </div>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
  <div id="data-source"></div>
  <div id="app"><div class="loading">Loading eval data...</div></div>

  <script>
    // ─── Configuration ───────────────────────────────────────────────────
    const DATA_URL = 'https://raw.githubusercontent.com/pgermishuys/opencode-weave/main/evals/results/agent-routing.jsonl';

    // ─── JSONL Format Detection & Normalization ──────────────────────────
    function isMainFormat(obj) {
      return 'suiteId' in obj && 'summary' in obj && 'caseResults' in obj;
    }

    function isSpikeFormat(obj) {
      return 'model' in obj && 'score' in obj && 'timestamp' in obj;
    }

    function normalizeMainRun(run) {
      const startMs = new Date(run.startedAt).getTime();
      const endMs = new Date(run.finishedAt).getTime();
      return {
        timestamp: run.startedAt,
        model: 'unknown',
        totalCases: run.summary.totalCases,
        passedCases: run.summary.passedCases,
        failedCases: run.summary.failedCases + (run.summary.errorCases || 0),
        score: run.summary.normalizedScore,
        durationMs: endMs - startMs,
        caseResults: (run.caseResults || []).map(cr => ({
          caseId: cr.caseId,
          description: cr.description || '',
          passed: cr.status === 'passed',
          score: cr.normalizedScore,
        })),
      };
    }

    function normalizeSpikeRun(run) {
      return {
        timestamp: run.timestamp,
        model: run.model,
        totalCases: run.totalCases,
        passedCases: run.passedCases,
        failedCases: run.failedCases,
        score: run.score,
        durationMs: run.durationMs,
        caseResults: (run.results || []).map(r => ({
          caseId: r.caseId,
          description: r.description || '',
          passed: r.passed,
          score: r.score,
        })),
      };
    }

    function parseJsonl(text) {
      const lines = text.split('\n').filter(l => l.trim().length > 0);
      const runs = [];
      for (const line of lines) {
        try {
          const parsed = JSON.parse(line);
          if (isMainFormat(parsed)) {
            runs.push(normalizeMainRun(parsed));
          } else if (isSpikeFormat(parsed)) {
            runs.push(normalizeSpikeRun(parsed));
          }
        } catch (e) {
          // skip malformed lines
        }
      }
      runs.sort((a, b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());
      return runs;
    }

    // ─── Analysis ────────────────────────────────────────────────────────
    function buildCaseHistory(runs) {
      const map = new Map();
      for (const run of runs) {
        for (const cr of run.caseResults) {
          let h = map.get(cr.caseId);
          if (!h) {
            h = { caseId: cr.caseId, description: cr.description || '', appearances: 0, passes: 0, failures: 0, passRate: 0, isFlaky: false, lastResult: null, trend: [] };
            map.set(cr.caseId, h);
          }
          if (cr.description) h.description = cr.description;
          h.appearances++;
          if (cr.passed) h.passes++; else h.failures++;
          h.lastResult = cr.passed ? 'pass' : 'fail';
          h.trend.push(cr.passed ? 'pass' : 'fail');
        }
      }
      for (const h of map.values()) {
        h.passRate = h.appearances > 0 ? h.passes / h.appearances : 0;
        h.isFlaky = h.appearances >= 3 && h.passRate > 0 && h.passRate < 1;
      }
      return map;
    }

    // ─── Chart Helpers ───────────────────────────────────────────────────
    const chartDefaults = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b949e', font: { size: 12 } } },
      },
      scales: {
        x: {
          type: 'time',
          time: { tooltipFormat: 'yyyy-MM-dd HH:mm' },
          ticks: { color: '#8b949e', maxTicksLimit: 8 },
          grid: { color: 'rgba(48, 54, 61, 0.5)' },
        },
        y: {
          ticks: { color: '#8b949e' },
          grid: { color: 'rgba(48, 54, 61, 0.5)' },
        },
      },
    };

    function makeTimePoint(run) { return new Date(run.timestamp); }

    // ─── Rendering ───────────────────────────────────────────────────────
    let charts = [];

    function destroyCharts() {
      charts.forEach(c => c.destroy());
      charts = [];
    }

    function renderDashboard(runs) {
      destroyCharts();
      const app = document.getElementById('app');

      if (runs.length === 0) {
        app.innerHTML = `
          <div class="empty-state">
            <h2>No eval data yet</h2>
            <p>Run an eval with <code>bun run script/eval.ts --suite agent-routing --jsonl</code> to generate data.</p>
            <p style="margin-top: 8px;">Or trigger the <strong>Agent Evals</strong> workflow in GitHub Actions.</p>
          </div>`;
        return;
      }

      const latest = runs[runs.length - 1];
      const previous = runs.length >= 2 ? runs[runs.length - 2] : null;
      const scores = runs.map(r => r.score);
      const avgScore = scores.reduce((a, b) => a + b, 0) / scores.length;
      const bestScore = Math.max(...scores);
      const durations = runs.map(r => r.durationMs);
      const avgDuration = durations.reduce((a, b) => a + b, 0) / durations.length;
      const caseHistory = buildCaseHistory(runs);
      const flakyCases = [...caseHistory.values()].filter(h => h.isFlaky);

      // ── Delta helper
      function delta(current, prev) {
        if (prev === null || prev === undefined) return { text: 'N/A', cls: 'delta-flat' };
        const d = current - prev;
        if (Math.abs(d) < 0.005) return { text: '—', cls: 'delta-flat' };
        const sign = d > 0 ? '+' : '';
        const cls = d > 0 ? 'delta-up' : 'delta-down';
        return { text: `${sign}${d.toFixed(2)}`, cls };
      }

      const scoreDelta = delta(latest.score, previous?.score);
      const durationDeltaMs = previous ? latest.durationMs - previous.durationMs : null;
      const durationDelta = durationDeltaMs !== null
        ? { text: `${durationDeltaMs > 0 ? '+' : ''}${(durationDeltaMs / 1000).toFixed(1)}s`, cls: durationDeltaMs > 500 ? 'delta-down' : durationDeltaMs < -500 ? 'delta-up' : 'delta-flat' }
        : { text: 'N/A', cls: 'delta-flat' };

      app.innerHTML = `
        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="label">Latest Score</div>
            <div class="value" style="color: ${latest.score >= 0.9 ? 'var(--green)' : latest.score >= 0.7 ? 'var(--yellow)' : 'var(--red)'}">
              ${(latest.score * 100).toFixed(0)}%
            </div>
            <div class="delta ${scoreDelta.cls}">${scoreDelta.text} vs previous</div>
          </div>
          <div class="stat-card">
            <div class="label">Pass Rate</div>
            <div class="value">${latest.passedCases}/${latest.totalCases}</div>
            <div class="delta delta-flat">${latest.failedCases} failed</div>
          </div>
          <div class="stat-card">
            <div class="label">Duration</div>
            <div class="value">${(latest.durationMs / 1000).toFixed(1)}s</div>
            <div class="delta ${durationDelta.cls}">${durationDelta.text} vs previous</div>
          </div>
          <div class="stat-card">
            <div class="label">Runs</div>
            <div class="value">${runs.length}</div>
            <div class="delta delta-flat">avg score: ${(avgScore * 100).toFixed(0)}%</div>
          </div>
          <div class="stat-card">
            <div class="label">Flaky Cases</div>
            <div class="value" style="color: ${flakyCases.length > 0 ? 'var(--yellow)' : 'var(--green)'}">
              ${flakyCases.length}
            </div>
            <div class="delta delta-flat">${caseHistory.size} total cases</div>
          </div>
          <div class="stat-card">
            <div class="label">Best Score</div>
            <div class="value" style="color: var(--green)">${(bestScore * 100).toFixed(0)}%</div>
            <div class="delta delta-flat">across all runs</div>
          </div>
        </div>

        <!-- Score Trend Chart -->
        <div class="chart-container">
          <h2>Score Trend</h2>
          <div class="chart-wrapper"><canvas id="scoreChart"></canvas></div>
        </div>

        <!-- Duration + Pass Rate side by side -->
        <div class="two-col">
          <div class="chart-container">
            <h2>Duration Trend</h2>
            <div class="chart-wrapper"><canvas id="durationChart"></canvas></div>
          </div>
          <div class="chart-container">
            <h2>Pass Rate Trend</h2>
            <div class="chart-wrapper"><canvas id="passRateChart"></canvas></div>
          </div>
        </div>

        <!-- Per-Case Pass Rate Chart -->
        <div class="chart-container">
          <h2>Per-Case Score History</h2>
          <div class="chart-wrapper" style="height: 320px;"><canvas id="caseChart"></canvas></div>
        </div>

        <!-- Case Stability Table -->
        <div class="chart-container">
          <h2>Case Stability</h2>
          <table>
            <thead>
              <tr><th>Case</th><th>Pass Rate</th><th>Last 6 Runs</th><th>Status</th></tr>
            </thead>
            <tbody id="caseTable"></tbody>
          </table>
        </div>
      `;

      // ── Score Trend Chart
      const scoreChart = new Chart(document.getElementById('scoreChart'), {
        type: 'line',
        data: {
          datasets: [{
            label: 'Score',
            data: runs.map(r => ({ x: makeTimePoint(r), y: r.score })),
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88, 166, 255, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 6,
          }, {
            label: 'Threshold (80%)',
            data: runs.map(r => ({ x: makeTimePoint(r), y: 0.8 })),
            borderColor: 'rgba(248, 81, 73, 0.4)',
            borderDash: [6, 4],
            pointRadius: 0,
            fill: false,
          }],
        },
        options: {
          ...chartDefaults,
          scales: {
            ...chartDefaults.scales,
            y: { ...chartDefaults.scales.y, min: 0, max: 1.05, ticks: { ...chartDefaults.scales.y.ticks, callback: v => (v * 100).toFixed(0) + '%' } },
          },
        },
      });
      charts.push(scoreChart);

      // ── Duration Chart
      const durationChart = new Chart(document.getElementById('durationChart'), {
        type: 'bar',
        data: {
          datasets: [{
            label: 'Duration (s)',
            data: runs.map(r => ({ x: makeTimePoint(r), y: r.durationMs / 1000 })),
            backgroundColor: 'rgba(188, 140, 255, 0.6)',
            borderColor: '#bc8cff',
            borderWidth: 1,
            borderRadius: 4,
          }],
        },
        options: {
          ...chartDefaults,
          scales: {
            ...chartDefaults.scales,
            y: { ...chartDefaults.scales.y, beginAtZero: true, ticks: { ...chartDefaults.scales.y.ticks, callback: v => v + 's' } },
          },
        },
      });
      charts.push(durationChart);

      // ── Pass Rate Chart
      const passRateChart = new Chart(document.getElementById('passRateChart'), {
        type: 'line',
        data: {
          datasets: [{
            label: 'Pass Rate',
            data: runs.map(r => ({ x: makeTimePoint(r), y: r.totalCases > 0 ? r.passedCases / r.totalCases : 0 })),
            borderColor: '#3fb950',
            backgroundColor: 'rgba(63, 185, 80, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
          }],
        },
        options: {
          ...chartDefaults,
          scales: {
            ...chartDefaults.scales,
            y: { ...chartDefaults.scales.y, min: 0, max: 1.05, ticks: { ...chartDefaults.scales.y.ticks, callback: v => (v * 100).toFixed(0) + '%' } },
          },
        },
      });
      charts.push(passRateChart);

      // ── Per-Case Chart
      const caseColors = ['#58a6ff', '#3fb950', '#bc8cff', '#d29922', '#f85149', '#79c0ff', '#56d364', '#d2a8ff', '#e3b341', '#ff7b72'];
      const caseIds = [...caseHistory.keys()].sort();
      const caseDatasets = caseIds.map((caseId, i) => {
        const dataPoints = [];
        for (const run of runs) {
          const cr = run.caseResults.find(c => c.caseId === caseId);
          if (cr) {
            dataPoints.push({ x: makeTimePoint(run), y: cr.score });
          }
        }
        return {
          label: caseId,
          data: dataPoints,
          borderColor: caseColors[i % caseColors.length],
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 3,
          borderWidth: 2,
        };
      });

      const caseChart = new Chart(document.getElementById('caseChart'), {
        type: 'line',
        data: { datasets: caseDatasets },
        options: {
          ...chartDefaults,
          scales: {
            ...chartDefaults.scales,
            y: { ...chartDefaults.scales.y, min: 0, max: 1.05, ticks: { ...chartDefaults.scales.y.ticks, callback: v => (v * 100).toFixed(0) + '%' } },
          },
          plugins: {
            ...chartDefaults.plugins,
            legend: { labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 12, padding: 10 }, position: 'bottom' },
          },
        },
      });
      charts.push(caseChart);

      // ── Case Stability Table
      const tbody = document.getElementById('caseTable');
      const sortedCases = [...caseHistory.values()].sort((a, b) => a.passRate - b.passRate || a.caseId.localeCompare(b.caseId));

      for (const h of sortedCases) {
        const tr = document.createElement('tr');
        const rate = (h.passRate * 100).toFixed(0);
        const last6 = h.trend.slice(-6).map(r => r === 'pass' ? '\u2705' : '\u274C').join(' ');
        let badge, badgeCls;
        if (h.passRate === 1) { badge = 'Stable'; badgeCls = 'badge-stable'; }
        else if (h.isFlaky) { badge = 'Flaky'; badgeCls = 'badge-flaky'; }
        else if (h.passRate === 0) { badge = 'Failing'; badgeCls = 'badge-failing'; }
        else if (h.appearances < 3) { badge = 'New'; badgeCls = 'badge-new'; }
        else { badge = 'Unstable'; badgeCls = 'badge-flaky'; }

        tr.innerHTML = `
          <td><code>${h.caseId}</code>${h.description ? `<div style="color: var(--text-dim); font-size: 12px; margin-top: 2px;">${h.description}</div>` : ''}</td>
          <td>${rate}% <span style="color: var(--text-dim)">(${h.passes}/${h.appearances})</span></td>
          <td class="trend-dots">${last6}</td>
          <td><span class="badge ${badgeCls}">${badge}</span></td>
        `;
        tbody.appendChild(tr);
      }
    }

    // ─── Data Loading ────────────────────────────────────────────────────
    async function loadData() {
      const app = document.getElementById('app');
      const source = document.getElementById('data-source');
      source.textContent = `Data: ${DATA_URL}`;

      app.innerHTML = '<div class="loading">Loading eval data...</div>';

      try {
        const resp = await fetch(DATA_URL);
        if (!resp.ok) {
          if (resp.status === 404) {
            // File doesn't exist yet — show empty state
            renderDashboard([]);
            return;
          }
          throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        }
        const text = await resp.text();
        if (!text.trim()) {
          renderDashboard([]);
          return;
        }
        const runs = parseJsonl(text);
        renderDashboard(runs);
      } catch (err) {
        app.innerHTML = `<div class="error">
          <p>Failed to load eval data</p>
          <p style="font-size: 13px; margin-top: 8px; color: var(--text-dim)">${err.message}</p>
          <p style="font-size: 13px; margin-top: 16px; color: var(--text-dim)">
            Make sure the JSONL file exists at the data URL and CORS allows access.<br>
            For local testing, you can use a local server or browser extension to bypass CORS.
          </p>
        </div>`;
      }
    }

    // ── Boot
    loadData();
  </script>
</body>
</html>
