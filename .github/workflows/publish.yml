name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.7.0-beta.1). Prerelease versions publish to "next" dist-tag.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts not found" && exit 1)
          echo "Build output verified"

      - name: Set package version and dist-tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_TAG=next" >> "$GITHUB_OUTPUT"
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
            echo "Publishing version $VERSION to dist-tag: next (prerelease)"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_OUTPUT"
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
            echo "Publishing version $VERSION to dist-tag: latest (stable)"
          fi

      - name: Publish
        run: npm publish --tag ${{ steps.version.outputs.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify weave-website to update version
        if: steps.version.outputs.IS_PRERELEASE == 'false'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/pgermishuys/weave-website/dispatches \
            -d "{\"event_type\":\"version-update\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
