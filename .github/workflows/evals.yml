name: Evals

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"   # Weekly Monday 10:00 UTC — Phase 2 live eval
  workflow_dispatch:
    inputs:
      run_phase2:
        description: "Run non-blocking Phase 2 Loom routing eval (requires GITHUB_TOKEN)"
        required: false
        default: "false"

jobs:
  deterministic-evals:
    name: Full Deterministic Eval Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full deterministic eval suite
        run: bun run eval --suite prompt-contracts --baseline evals/baselines/prompt-contracts.json --fail-on-regression

      - name: Run smoke baseline comparison
        run: bun run eval --suite prompt-smoke --baseline evals/baselines/prompt-smoke.json --fail-on-regression

      - name: Verify eval coverage
        run: bun run eval:coverage

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-artifacts
          path: .weave/evals/
          if-no-files-found: ignore

  detect-prompt-changes:
    name: Detect Agent Prompt Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    outputs:
      prompts_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for prompt file changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD -- 'src/agents/**/default.ts' 'src/agents/**/prompt-composer.ts' | head -1)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prompt files changed — will trigger Phase 2 live eval"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No prompt files changed"
          fi

  phase2-routing:
    name: Phase2 Routing (live/non-blocking)
    needs: [detect-prompt-changes]
    if: >-
      always() && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_phase2 == 'true') ||
        needs.detect-prompt-changes.outputs.prompts_changed == 'true'
      )
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run phase2 routing (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run eval --suite agent-routing

      - name: Upload phase2 routing artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-routing-artifacts
          path: .weave/evals/
          if-no-files-found: ignore
