name: Agent Evals

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"   # Weekly Monday 10:00 UTC — live routing eval
  workflow_dispatch:
    inputs:
      run_routing:
        description: "Run agent routing eval (live, non-blocking)"
        required: false
        default: "true"
      model:
        description: "Specific model to evaluate (leave blank to run all models in matrix)"
        required: false
        default: ""

jobs:
  deterministic-evals:
    name: Full Deterministic Eval Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full deterministic eval suite
        run: bun run eval --suite prompt-contracts --baseline evals/baselines/prompt-contracts.json --fail-on-regression

      - name: Run smoke baseline comparison
        run: bun run eval --suite prompt-smoke --baseline evals/baselines/prompt-smoke.json --fail-on-regression

      - name: Verify eval coverage
        run: bun run eval:coverage

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-artifacts
          path: .weave/evals/
          if-no-files-found: ignore

  detect-prompt-changes:
    name: Detect Agent Prompt Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    outputs:
      prompts_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for prompt file changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD -- 'src/agents/**/default.ts' 'src/agents/**/prompt-composer.ts' | head -1)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Prompt files changed — will trigger live routing eval"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No prompt files changed"
          fi

  compute-routing-matrix:
    name: Compute Routing Model Matrix
    needs: [detect-prompt-changes]
    if: >-
      always() && (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_routing == 'true') ||
        needs.detect-prompt-changes.outputs.prompts_changed == 'true'
      )
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.set-matrix.outputs.models }}
    steps:
      - name: Determine models to evaluate
        id: set-matrix
        env:
          INPUT_MODEL: ${{ inputs.model }}
        run: |
          if [ -n "$INPUT_MODEL" ]; then
            # Specific model requested via workflow_dispatch — run only that model
            echo "models=[\"$INPUT_MODEL\"]" >> "$GITHUB_OUTPUT"
          else
            # Default: run all models across providers
            echo 'models=["gpt-4o-mini","claude-sonnet-4-20250514"]' >> "$GITHUB_OUTPUT"
          fi

  agent-routing:
    name: Agent Routing (${{ matrix.model }}, live, non-blocking)
    needs: [compute-routing-matrix]
    if: always() && needs.compute-routing-matrix.result != 'skipped'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
      models: read
    strategy:
      # Run models sequentially to avoid git push conflicts on the shared JSONL file
      max-parallel: 1
      matrix:
        model: ${{ fromJSON(needs.compute-routing-matrix.outputs.models) }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent routing eval — ${{ matrix.model }} (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_MODEL: ${{ matrix.model }}
        run: bun run eval --suite agent-routing --jsonl --model "$EVAL_MODEL"

      - name: Generate trend report — ${{ matrix.model }}
        if: always()
        continue-on-error: true
        run: bun run script/eval-trend-report.ts --suite agent-routing --check --threshold 0.80

      - name: Commit JSONL results — ${{ matrix.model }}
        if: github.ref == 'refs/heads/main' && always()
        env:
          EVAL_MODEL: ${{ matrix.model }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/results/agent-routing.jsonl
          git diff --cached --quiet || git commit -m "chore(evals): update agent-routing trend results [$EVAL_MODEL] [skip ci]"
          git pull --rebase || true
          git push

      - name: Upload routing eval artifacts — ${{ matrix.model }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: routing-eval-artifacts-${{ matrix.model }}
          path: |
            .weave/evals/
            evals/results/agent-routing.jsonl
          if-no-files-found: ignore
